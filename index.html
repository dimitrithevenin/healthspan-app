function buildCalendarWeeks(weeks = 24) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayOfWeek = today.getDay();
  const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const start = new Date(today);
  start.setDate(today.getDate() + diffToMonday);
  const result = [];
  for (let w = 0; w < weeks; w++) {
    const days = WEEKLY_PATTERN.map((d, i) => {
      const date = new Date(start);
      date.setDate(start.getDate() + w * 7 + i);
      return {
        ...d,
        date
      };
    });
    result.push({
      week: w + 1,
      days
    });
  }
  return result;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function generateCircuit() {
  const categories = shuffle(Object.keys(MOVEMENT_POOL));
  const movements = categories.map(cat => {
    const options = MOVEMENT_POOL[cat];
    return options[Math.floor(Math.random() * options.length)];
  });
  return {
    movements
  };
}

// EMOM timing: each movement gets its seconds, then rest fills to 60s
function buildEmomSequence(movements) {
  return movements.map(m => ({
    name: m.name,
    reps: m.reps,
    work: m.seconds,
    rest: 60 - m.seconds

}
